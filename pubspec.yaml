name: liu_family_library
description: 刘老大家庭书库管理器 - 家庭藏书离线档案管理工具

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 本地数据库
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 扫码
  mobile_scanner: ^4.0.1
  
  # 图片
  image_picker: ^1.0.7
  
  # 路径
  path_provider: ^2.1.2
  path: ^1.8.3
  
  # 图片查看
  photo_view: ^0.14.0
  
  # 分享备份
  share_plus: ^7.2.0
  file_picker: ^6.1.1
  
  # 图表统计
  fl_chart: ^0.66.0
  
  # 图标
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true